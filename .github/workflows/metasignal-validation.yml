name: MetaSignal Validation

on:
  push:
    branches: [ main, metasignal-prd-core ]
  pull_request:
    branches: [ main ]

jobs:
  validate-static:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lightweight dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy fastapi httpx pandas pyarrow sqlalchemy pg8000

      - name: Validate core statistical suite
        run: |
          PYTHONPATH=. python scripts/run_prd_core_validation_suite_v1.py

      - name: Validate streaming PRD suite
        run: |
          PYTHONPATH=. python scripts/show_streaming_demo.py
          PYTHONPATH=. python scripts/validate_streaming_prd_v1.py
