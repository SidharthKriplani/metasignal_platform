  <text x="600" y="476" text-anchor="middle" fill="#334155" font-size="9">github.com/SidharthKriplani/metasignal_platform · Production-simulated A/B experimentation intelligence · CUPED + SRM + A/A + Guardrail-first + Streaming</text>
