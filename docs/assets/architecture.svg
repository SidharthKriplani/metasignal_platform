  <line x1="740" y1="383" x2="740" y2="445" stroke="#1e293b" stroke-width="1"/>

  <!-- Stat 4 -->
  <text x="850" y="402" text-anchor="middle" fill="#94a3b8" font-size="8.5" font-weight="700" letter-spacing="1">DOW ANOMALY DETECTION</text>
  <text x="850" y="428" text-anchor="middle" fill="#a78bfa" font-size="22" font-weight="700">Adjusted</text>
  <text x="850" y="446" text-anchor="middle" fill="#475569" font-size="8">synthetic backtest evidence</text>

  <line x1="960" y1="383" x2="960" y2="445" stroke="#1e293b" stroke-width="1"/>

