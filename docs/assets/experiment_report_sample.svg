<svg viewBox="0 0 980 440" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="980" height="440" fill="url(#bg2)"/>

  <!-- Top banner -->
  <rect x="0" y="0" width="980" height="72" fill="#1e293b"/>
  <line x1="0" y1="72" x2="980" y2="72" stroke="#334155" stroke-width="1.5"/>

  <!-- LAUNCH badge -->
  <rect x="22" y="14" width="90" height="44" rx="8" fill="#14532d"/>
  <rect x="22" y="14" width="90" height="44" rx="8" fill="none" stroke="#4ade80" stroke-width="1.5"/>
  <text x="67" y="32" text-anchor="middle" fill="#86efac" font-size="9" font-weight="600" letter-spacing="1">RECOMMENDATION</text>
  <text x="67" y="52" text-anchor="middle" fill="#4ade80" font-size="18" font-weight="800">LAUNCH</text>

  <!-- Experiment title -->
  <text x="140" y="30" fill="#f1f5f9" font-size="14" font-weight="700">Experiment: Homepage Feed Ranking v2</text>
  <text x="140" y="52" fill="#94a3b8" font-size="11">14-day run · 48,320 users · Guardrail-first decision framework · MetaSignal Platform</text>

  <!-- Status pill -->
  <rect x="810" y="18" width="150" height="34" rx="8" fill="#14532d"/>
  <text x="885" y="32" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="600">ALL GUARDRAILS PASS</text>
  <text x="885" y="46" text-anchor="middle" fill="#86efac" font-size="8">12/12 golden scenarios</text>

  <!-- METRIC CARDS ROW -->

  <!-- Card 1: SRM -->
  <rect x="22" y="90" width="215" height="185" rx="12" fill="#1e293b" filter="url(#shadow2)"/>
  <rect x="22" y="90" width="215" height="5" rx="2" fill="#065f46"/>
  <text x="129" y="118" text-anchor="middle" fill="#6ee7b7" font-size="9" font-weight="600" letter-spacing="1">SAMPLE RATIO MISMATCH</text>
  <text x="129" y="138" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="700">SRM Check</text>
  <!-- PASS badge -->
  <rect x="79" y="148" width="100" height="30" rx="8" fill="#14532d"/>
  <text x="129" y="168" text-anchor="middle" fill="#4ade80" font-size="16" font-weight="800">PASS</text>
  <line x1="42" y1="193" x2="217" y2="193" stroke="#334155" stroke-width="1"/>
  <text x="129" y="213" text-anchor="middle" fill="#94a3b8" font-size="10">chi-squared test p-value</text>
  <text x="129" y="231" text-anchor="middle" fill="#4ade80" font-size="22" font-weight="700">p = 0.71</text>
  <text x="129" y="252" text-anchor="middle" fill="#94a3b8" font-size="9">No traffic imbalance detected</text>
  <text x="129" y="268" text-anchor="middle" fill="#94a3b8" font-size="9">Assignment: deterministic SHA-256</text>

  <!-- Card 2: CUPED -->
  <rect x="252" y="90" width="215" height="185" rx="12" fill="#1e293b" filter="url(#shadow2)"/>
  <rect x="252" y="90" width="215" height="5" rx="2" fill="#1d4ed8"/>
  <text x="359" y="118" text-anchor="middle" fill="#93c5fd" font-size="9" font-weight="600" letter-spacing="1">CUPED EVALUATION</text>
  <text x="359" y="138" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="700">Variance Reduction</text>
  <!-- Key stats -->
  <text x="299" y="162" text-anchor="middle" fill="#94a3b8" font-size="9">Variance</text>
  <text x="299" y="180" text-anchor="middle" fill="#4ade80" font-size="20" font-weight="700">-23%</text>
  <text x="415" y="162" text-anchor="middle" fill="#94a3b8" font-size="9">Lift</text>
  <text x="415" y="180" text-anchor="middle" fill="#60a5fa" font-size="20" font-weight="700">+2.4%</text>
  <line x1="272" y1="193" x2="447" y2="193" stroke="#334155" stroke-width="1"/>
  <text x="359" y="212" text-anchor="middle" fill="#94a3b8" font-size="10">Pre-experiment covariate used</text>
  <text x="359" y="229" text-anchor="middle" fill="#94a3b8" font-size="10">Variance reduction narrows CI</text>
  <text x="359" y="246" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">Effect statistically significant</text>
  <rect x="282" y="255" width="154" height="16" rx="4" fill="#1e3a8a"/>
  <text x="359" y="267" text-anchor="middle" fill="#bfdbfe" font-size="9" font-weight="600">A/A validated · 1,000 runs · FPR=5.5%</text>

  <!-- Card 3: A/A Baseline -->
  <rect x="482" y="90" width="215" height="185" rx="12" fill="#1e293b" filter="url(#shadow2)"/>
  <rect x="482" y="90" width="215" height="5" rx="2" fill="#4c1d95"/>
  <text x="589" y="118" text-anchor="middle" fill="#c4b5fd" font-size="9" font-weight="600" letter-spacing="1">A/A CALIBRATION</text>
  <text x="589" y="138" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="700">A/A Baseline Check</text>
  <!-- FPR display -->
  <text x="589" y="163" text-anchor="middle" fill="#94a3b8" font-size="9">False Positive Rate (1,000 runs)</text>
  <text x="589" y="188" text-anchor="middle" fill="#a78bfa" font-size="32" font-weight="800">4.8%</text>
  <line x1="502" y1="198" x2="677" y2="198" stroke="#334155" stroke-width="1"/>
  <text x="589" y="218" text-anchor="middle" fill="#94a3b8" font-size="10">Within acceptable range (≤ 5%)</text>
  <text x="589" y="234" text-anchor="middle" fill="#94a3b8" font-size="10">Test infrastructure calibrated</text>
  <rect x="519" y="248" width="140" height="20" rx="5" fill="#2e1065"/>
  <text x="589" y="262" text-anchor="middle" fill="#ddd6fe" font-size="9" font-weight="600">Peeking risk: CONTROLLED</text>

  <!-- Card 4: Guardrails -->
  <rect x="712" y="90" width="246" height="185" rx="12" fill="#1e293b" filter="url(#shadow2)"/>
  <rect x="712" y="90" width="246" height="5" rx="2" fill="#991b1b"/>
  <text x="835" y="118" text-anchor="middle" fill="#fca5a5" font-size="9" font-weight="600" letter-spacing="1">GUARDRAIL-FIRST CHECK</text>
  <text x="835" y="138" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="700">Guardrail Status</text>
  <!-- Guardrail items -->
  <text x="732" y="162" fill="#4ade80" font-size="11" font-weight="700">PASS</text>
  <text x="780" y="162" fill="#d1d5db" font-size="10">Latency p99</text>
  <text x="732" y="180" fill="#4ade80" font-size="11" font-weight="700">PASS</text>
  <text x="780" y="180" fill="#d1d5db" font-size="10">Error rate guardrail</text>
  <text x="732" y="198" fill="#4ade80" font-size="11" font-weight="700">PASS</text>
  <text x="780" y="198" fill="#d1d5db" font-size="10">Revenue per user</text>
  <text x="732" y="216" fill="#4ade80" font-size="11" font-weight="700">PASS</text>
  <text x="780" y="216" fill="#d1d5db" font-size="10">Right-censored metrics</text>
  <line x1="732" y1="228" x2="938" y2="228" stroke="#334155" stroke-width="1"/>
  <text x="835" y="248" text-anchor="middle" fill="#94a3b8" font-size="9">Guardrail-first: ship blocked if any fail</text>
  <rect x="752" y="256" width="166" height="16" rx="4" fill="#7f1d1d"/>
  <text x="835" y="268" text-anchor="middle" fill="#fca5a5" font-size="9" font-weight="600">All 4 guardrails: PASS → SHIP</text>

  <!-- Decision Rationale panel -->
  <rect x="22" y="295" width="936" height="75" rx="12" fill="#1e293b" filter="url(#shadow2)"/>
  <rect x="22" y="295" width="6" height="75" rx="3" fill="#4ade80"/>

  <text x="48" y="318" fill="#86efac" font-size="11" font-weight="700">Decision rationale:</text>
  <text x="190" y="318" fill="#e2e8f0" font-size="11">Statistically significant lift, no guardrail regressions, SRM clean.</text>
  <text x="48" y="338" fill="#e2e8f0" font-size="11">CUPED variance reduction (-23%) narrows the confidence interval, confirming the +2.4% effect is real and not noise. A/A calibration (FPR=4.8%) confirms the test</text>
  <text x="48" y="355" fill="#e2e8f0" font-size="11">infrastructure is not inflating false positives. All guardrails pass — guardrail-first gate cleared. Right-censored guardrail metrics marked immature, not failed.</text>
  <text x="48" y="373" fill="#6ee7b7" font-size="10" font-weight="600">Recommendation: LAUNCH · Monitor DOW-adjusted anomaly detection for 7 days post-launch · Decision logged in guardrail_decision_report.json</text>

  <!-- Footer -->
  <rect x="0" y="394" width="980" height="46" fill="#0f172a"/>
  <line x1="0" y1="394" x2="980" y2="394" stroke="#1e293b" stroke-width="1"/>
  <text x="490" y="414" text-anchor="middle" fill="#475569" font-size="9">METASIGNAL PLATFORM · Production-simulated experimentation intelligence · CUPED + SRM + A/A + Guardrail-first decisioning</text>
  <text x="490" y="432" text-anchor="middle" fill="#334155" font-size="8">github.com/SidharthKriplani/metasignal_platform</text>
</svg>
